services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    image: form-pipeline:latest
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:8b
      REDIS_HOST: redis
      JOBS_DIR: /var/lib/form-pipeline/jobs
      # Honour host-shell overrides so tests can flip rate limits for one
      # run via `RATE_LIMIT_FILL_FORM=3/minute docker compose up -d`.
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-1}
      RATE_LIMIT_GENERATE: ${RATE_LIMIT_GENERATE:-30/minute}
      RATE_LIMIT_FILL_FORM: ${RATE_LIMIT_FILL_FORM:-120/minute}
      RATE_LIMIT_TO_ACROFORM: ${RATE_LIMIT_TO_ACROFORM:-120/minute}
      # CORS_ALLOWED_ORIGINS — falls back to config.py's localhost set
      # unless explicitly set in the host shell:
      #   CORS_ALLOWED_ORIGINS=https://app.example.com docker compose up -d
      # Webhook signing — when set, every webhook POST carries
      # X-Form-Pipeline-Signature: sha256=<hmac>. Receivers verify with
      # the same secret. Unset → no signature header.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-10}
    volumes:
      - jobs:/var/lib/form-pipeline/jobs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      # Required on Linux so `host.docker.internal` resolves to the host;
      # harmless on macOS / Docker Desktop.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request,sys
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    image: form-pipeline:latest
    command: ["arq", "api.worker.WorkerSettings"]
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:8b
      REDIS_HOST: redis
      JOBS_DIR: /var/lib/form-pipeline/jobs
      # The worker is what POSTs the webhook (deliver_webhook), so it needs
      # the same secret + timeout as the API container.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-10}
    volumes:
      - jobs:/var/lib/form-pipeline/jobs
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  jobs:                              # shared between api + worker
